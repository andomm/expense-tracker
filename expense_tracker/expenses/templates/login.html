{% extends 'base.html' %}
{% block content %}
<div class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
	<h2>Login</h2>
	<form method="post" class="space-y-3">
		{% csrf_token %}
		{{ form.as_p }}
		<button type="submit" class="w-full rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Login</button>
	</form>
	<p class="mt-4 text-sm text-slate-600">Don't have an account? <a class="font-medium text-indigo-600 hover:text-indigo-800" href="{% url 'signup' %}">Sign up here</a></p>
</div>
{% endblock %}
